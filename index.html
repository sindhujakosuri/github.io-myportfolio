<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kosuri Sunitha Sindhuja — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #faf8f5;
  --warm-white: #f5f2ed;
  --blush: #f2e8e0;
  --sage: #b8c9b5;
  --sage-dark: #7a9e76;
  --dusty-rose: #c9a89a;
  --terracotta: #b5614a;
  --navy: #1d2b45;
  --navy-light: #2e4170;
  --gold: #c9a84c;
  --gold-light: #e8d5a0;
  --text-dark: #2c2c2c;
  --text-mid: #555555;
  --text-light: #888888;
  --border: #e0d8cf;
  --card-bg: #ffffff;
  --shadow: 0 4px 30px rgba(29,43,69,0.08);
  --shadow-hover: 0 12px 40px rgba(29,43,69,0.15);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background-color: var(--cream);
  color: var(--text-dark);
  line-height: 1.7;
  overflow-x: hidden;
}

header {
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 1000;
  background: rgba(250,248,245,0.92);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  transition: box-shadow 0.3s;
}
header.scrolled { box-shadow: 0 2px 20px rgba(29,43,69,0.1); }

nav {
  max-width: 1140px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.1rem 2.5rem;
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--navy);
  letter-spacing: 0.5px;
}
.logo span { color: var(--terracotta); }

nav ul { list-style: none; display: flex; gap: 0.3rem; }

nav ul li {
  padding: 0.45rem 1rem;
  border-radius: 100px;
  cursor: pointer;
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text-mid);
  letter-spacing: 0.3px;
  transition: all 0.3s ease;
}
nav ul li:hover, nav ul li.active {
  background: var(--navy);
  color: #fff;
}

section {
  max-width: 1100px;
  margin: 0 auto;
  padding: 7rem 2.5rem 5rem;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
section.visible { opacity: 1; transform: translateY(0); }

#home {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
  padding-top: 9rem;
}

.home-left { order: 1; }
.home-right { order: 2; display: flex; justify-content: center; }

.greeting {
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--terracotta);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}
.greeting::before {
  content: '';
  width: 30px;
  height: 1.5px;
  background: var(--terracotta);
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 4rem;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.1;
  margin-bottom: 0.5rem;
}

.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-weight: 400;
  font-style: italic;
  color: var(--dusty-rose);
  margin-bottom: 1.5rem;
}

.home-desc {
  font-size: 1rem;
  color: var(--text-mid);
  max-width: 460px;
  margin-bottom: 2.5rem;
  line-height: 1.8;
}

.ieee-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  background: linear-gradient(135deg, #eef3ff, #dce8ff);
  border: 1px solid #b8cdf5;
  border-radius: 100px;
  padding: 0.5rem 1.2rem;
  font-size: 0.82rem;
  font-weight: 600;
  color: #2e4170;
  margin-bottom: 2.5rem;
  letter-spacing: 0.2px;
}
.ieee-badge svg { width: 16px; height: 16px; }

.btn-group { display: flex; gap: 1rem; flex-wrap: wrap; }

.btn-primary {
  padding: 0.85rem 2rem;
  background: var(--navy);
  color: #fff;
  border: none;
  border-radius: 100px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 0.3px;
}
.btn-primary:hover { background: var(--terracotta); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(181,97,74,0.3); }

.btn-outline {
  padding: 0.85rem 2rem;
  background: transparent;
  color: var(--navy);
  border: 1.5px solid var(--navy);
  border-radius: 100px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
}
.btn-outline:hover { background: var(--navy); color: #fff; transform: translateY(-2px); }

.profile-wrap {
  position: relative;
  width: 320px;
  height: 380px;
}
.profile-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--gold-light), var(--blush));
  border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%;
  animation: morph 8s ease-in-out infinite;
}
@keyframes morph {
  0%, 100% { border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%; }
  50% { border-radius: 60% 40% 40% 60% / 60% 60% 40% 40%; }
}
.profile-img {
  position: absolute;
  inset: 16px;
  border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%;
  overflow: hidden;
  animation: morph 8s ease-in-out infinite;
}
.profile-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
}
.profile-accent {
  position: absolute;
  bottom: -16px;
  right: -16px;
  width: 100px;
  height: 100px;
  border: 2px solid var(--sage);
  border-radius: 50%;
  opacity: 0.5;
}
.profile-accent2 {
  position: absolute;
  top: -20px;
  left: -20px;
  width: 60px;
  height: 60px;
  background: var(--sage-dark);
  border-radius: 50%;
  opacity: 0.15;
}

.section-label {
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--terracotta);
  margin-bottom: 0.8rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}
.section-label::before { content: ''; width: 30px; height: 1.5px; background: var(--terracotta); }

h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.8rem;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 3rem;
  line-height: 1.15;
}

.edu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }

.edu-card {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 2rem;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: all 0.35s ease;
  position: relative;
  overflow: hidden;
}
.edu-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(to bottom, var(--terracotta), var(--gold));
}
.edu-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); }

.edu-year {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--terracotta);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 0.8rem;
}
.edu-card h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 0.4rem;
}
.edu-card p { font-size: 0.92rem; color: var(--text-mid); }
.edu-score {
  margin-top: 1rem;
  display: inline-block;
  background: linear-gradient(135deg, #eef8ee, #d5efd5);
  color: var(--sage-dark);
  padding: 0.3rem 0.9rem;
  border-radius: 100px;
  font-size: 0.82rem;
  font-weight: 600;
}

.ieee-section {
  background: linear-gradient(135deg, #1d2b45, #2e4170);
  border-radius: 24px;
  padding: 3rem;
  margin-top: 3rem;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.ieee-section::before {
  content: 'IEEE';
  position: absolute;
  right: -20px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'Cormorant Garamond', serif;
  font-size: 12rem;
  font-weight: 700;
  color: rgba(255,255,255,0.04);
  letter-spacing: -5px;
  user-select: none;
}
.ieee-top {
  display: flex;
  align-items: flex-start;
  gap: 2rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}
.ieee-icon-wrap {
  width: 64px;
  height: 64px;
  background: rgba(255,255,255,0.1);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.ieee-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.9rem;
  font-weight: 700;
  margin-bottom: 0.3rem;
}
.ieee-subtitle { color: rgba(255,255,255,0.65); font-size: 0.92rem; }

.ieee-events {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1rem;
  margin-top: 1.5rem;
}
.ieee-event {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 1.2rem 1.5rem;
  transition: background 0.3s;
}
.ieee-event:hover { background: rgba(255,255,255,0.12); }
.event-role {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold-light);
  margin-bottom: 0.4rem;
}
.event-name { font-weight: 500; font-size: 0.95rem; color: #fff; margin-bottom: 0.2rem; }
.event-detail { font-size: 0.82rem; color: rgba(255,255,255,0.5); }

.skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.2rem; }

.skill-card {
  background: var(--card-bg);
  border-radius: 18px;
  padding: 1.6rem;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
}
.skill-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }

.skill-name {
  font-weight: 600;
  color: var(--navy);
  font-size: 0.95rem;
  margin-bottom: 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.skill-pct { font-size: 0.82rem; color: var(--terracotta); font-weight: 700; }

.bar-track {
  width: 100%;
  height: 6px;
  background: var(--blush);
  border-radius: 100px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--terracotta), var(--gold));
  border-radius: 100px;
  transition: width 1.6s cubic-bezier(.25,.46,.45,.94);
}

.certs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 1.8rem;
}

.cert-card {
  background: var(--card-bg);
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: all 0.35s ease;
  cursor: pointer;
}
.cert-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-hover); }

.cert-img {
  width: 100%;
  height: 200px;
  overflow: hidden;
  background: var(--warm-white);
  display: flex;
  align-items: center;
  justify-content: center;
}
.cert-img img { width: 100%; height: 100%; object-fit: contain; padding: 1rem; }

.cert-body { padding: 1.4rem 1.6rem; }
.cert-org {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--terracotta);
  margin-bottom: 0.4rem;
}
.cert-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.4;
}

.contact-wrap {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 4rem;
  align-items: start;
}
.contact-info h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(
